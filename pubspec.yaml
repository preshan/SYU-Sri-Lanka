name: syu_sri_lanka
description: SYU Sri Lanka — youth membership, announcements, events, and messaging.
publish_to: "none"
version: 0.3.0+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.1
  go_router: ^15.1.2
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  hugeicons: ^1.1.7
  permission_handler: ^12.0.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/images/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/syu_icon_1024.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/brand/syu_icon_1024.png
  remove_alpha_ios: true
  min_sdk_android: 26
  web:
    generate: true
    image_path: assets/brand/syu_icon_1024.png
    background_color: "#000000"
    theme_color: "#E10600"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/brand/syu_logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/brand/syu_logo.png
